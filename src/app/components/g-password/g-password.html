<div class="max-w-1/3 mx-auto mt-10 p-6 bg-white rounded-2xl shadow-2xl">
  <h2 class="text-3xl font-bold text-center text-blue-400">password Generation</h2>
  <div class="text-center mt-6 p-8 bg-green rounded-lg">
    <p class="text-2xl font-bold font-mono break-all text-blue-300">
      Your New Password is :
      <u class="text-xl text-gray-500">
        {{ password() }}
      </u>
    </p>
  </div>

  <div class="text-center">
    <button
      class="border rounded-2xl text-2xl p-2 bg-slate-200 max-w-100 mt-10 hover:bg-gray-100"
      (click)="generate()"
    >
      Genarate Password !
    </button>
  </div>
</div>
